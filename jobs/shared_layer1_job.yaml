# Shared data layer — runs nightly, refreshes Unity Catalog for all audiences

resources:
  jobs:
    shared_layer1_job:
      name: "Shared data layer — nightly refresh"

      schedule:
        quartz_cron_expression: "0 0 18 * * ?"   # 6PM every night
        timezone_id: "America/New_York"
        pause_status: UNPAUSED

      git_source:
        url: https://github.com/kakarla7/sales-insights-framework
        provider: gitHub
        branch: main

      job_clusters:
        - job_cluster_key: shared_cluster
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 4

      tasks:
        - task_key: ingest_salesforce
          job_cluster_key: shared_cluster
          spark_python_task:
            python_file: shared/layer1/ingest_salesforce.py

        - task_key: ingest_third_party
          job_cluster_key: shared_cluster
          spark_python_task:
            python_file: shared/layer1/ingest_third_party.py

        - task_key: quality_gate
          depends_on:
            - task_key: ingest_salesforce
            - task_key: ingest_third_party
          job_cluster_key: shared_cluster
          spark_python_task:
            python_file: shared/layer1/quality_gate.py

        - task_key: write_unity_catalog
          depends_on:
            - task_key: quality_gate
          job_cluster_key: shared_cluster
          spark_python_task:
            python_file: shared/layer1/write_unity_catalog.py

      email_notifications:
        on_failure:
          - ${ALERT_EMAIL}

      timeout_seconds: 21600   # 6 hours max
