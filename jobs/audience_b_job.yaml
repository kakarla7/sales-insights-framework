# Audience B — weekly pipeline
# Schedule: every Sunday at 3AM ET

resources:
  jobs:
    audience_b_job:
      name: "Audience B — weekly pipeline"

      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"  # 3AM every Sunday
        timezone_id: "America/New_York"
        pause_status: UNPAUSED

      git_source:
        url: https://github.com/kakarla7/sales-insights-framework
        provider: gitHub
        branch: audience-b-prod

      job_clusters:
        - job_cluster_key: audience_b_cluster
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            spark_env_vars:
              AUDIENCE_ID: "AUDIENCE_B"
              SHARED_VERSION: "1.0.0"

      tasks:
        - task_key: install_packages
          job_cluster_key: audience_b_cluster
          spark_python_task:
            python_file: jobs/scripts/install_packages.py
            parameters: ["audience_b"]

        - task_key: drift_check
          depends_on:
            - task_key: install_packages
          job_cluster_key: audience_b_cluster
          spark_python_task:
            python_file: audiences/audience_b/detector.py
            parameters: ["--config", "audiences/audience_b/config.yaml"]

        - task_key: model_run
          depends_on:
            - task_key: drift_check
          job_cluster_key: audience_b_cluster
          spark_python_task:
            python_file: audiences/audience_b/model.py
            parameters: ["--config", "audiences/audience_b/config.yaml"]

        - task_key: deliver
          depends_on:
            - task_key: model_run
          job_cluster_key: audience_b_cluster
          spark_python_task:
            python_file: jobs/scripts/deliver.py
            parameters: ["audience_b"]

      email_notifications:
        on_failure:
          - ${ALERT_EMAIL}

      timeout_seconds: 10800
