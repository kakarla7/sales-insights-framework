name: Shared — auto tag on prod merge

on:
  push:
    branches:
      - shared-prod
    paths:
      - "shared/**"

jobs:
  auto_tag:
    name: Read VERSION and cut shared tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout shared-prod
        uses: actions/checkout@v3
        with:
          ref: shared-prod
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install shared framework
        run: pip install -e shared/insights_framework

      - name: Install test dependencies
        run: pip install pytest

      - name: Run shared unit tests
        run: pytest shared/insights_framework/tests/ -v

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat shared/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=shared-v$VERSION" >> $GITHUB_OUTPUT
          echo "Cutting tag: shared-v$VERSION"

      - name: Check tag does not already exist
        run: |
          TAG="shared-v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "ERROR: Tag $TAG already exists. Bump VERSION file to cut a new tag."
            exit 1
          fi
          echo "✓ Tag $TAG is new — proceeding"

      - name: Cut tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag shared-v${{ steps.version.outputs.version }}
          git push origin shared-v${{ steps.version.outputs.version }}

      - name: Summary
        run: |
          echo "✓ Tag cut: shared-v${{ steps.version.outputs.version }}"
          echo "✓ Audiences can now update shared_version in config.yaml"
