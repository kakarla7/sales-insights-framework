name: Audience B CI

on:
  push:
    branches:
      - audience-b-iat
      - audience-b-prod
    paths:
      - "audiences/audience_b/**"
      - "shared/**"
  pull_request:
    branches:
      - audience-b-dev
      - audience-b-iat
    paths:
      - "audiences/audience_b/**"
      - "shared/**"

jobs:
  test:
    name: Audience B — install, unit tests, integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install shared framework
        run: |
          cd shared/insights_framework
          pip install -e .

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run shared unit tests
        run: pytest shared/insights_framework/tests/ -v

      - name: Run Audience B integration tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:${{ github.workspace }}/audiences/audience_b"
          pytest audiences/audience_b/tests/ -v
